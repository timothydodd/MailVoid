name: Build and Deploy SMTP Server

on:
  push:
    branches: [ "master", "main" ]
    paths:
      - 'src/MailVoidSmtpServer/**'
      - '.github/workflows/smtp-server.yml'
  pull_request:
    branches: [ "master", "main" ]
    paths:
      - 'src/MailVoidSmtpServer/**'
      - '.github/workflows/smtp-server.yml'
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'

jobs:
  build:
    name: Build SMTP Server
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore src/MailVoidSmtpServer/MailVoidSmtpServer.csproj

    - name: Build
      run: dotnet build src/MailVoidSmtpServer/MailVoidSmtpServer.csproj --configuration Release --no-restore

    - name: Publish
      run: dotnet publish src/MailVoidSmtpServer/MailVoidSmtpServer.csproj --configuration Release --no-build --output ./publish

  docker-build:
    name: Build and Push SMTP Docker Image
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_PASSWORD }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ secrets.DOCKERHUB_USERNAME }}/mailvoid-smtp
        tags: |
          type=ref,event=branch
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./src/MailVoidSmtpServer
        file: ./src/MailVoidSmtpServer/Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha,scope=smtp
        cache-to: type=gha,mode=max,scope=smtp
        platforms: linux/amd64,linux/arm64
